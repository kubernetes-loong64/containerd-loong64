name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      RAW_VERSION: ${{ steps.extract.outputs.RAW_VERSION }}
      CONTAINERD_BRANCH: ${{ steps.extract.outputs.CONTAINERD_BRANCH }}
      RELEASE: ${{ steps.extract.outputs.RELEASE }}
      IS_STABLE: ${{ steps.extract.outputs.IS_STABLE }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract containerd branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_ENV}
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_OUTPUT}
          CONTAINERD_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "CONTAINERD_BRANCH=$CONTAINERD_BRANCH"
          echo "CONTAINERD_BRANCH=$CONTAINERD_BRANCH" >> ${GITHUB_ENV}
          echo "CONTAINERD_BRANCH=$CONTAINERD_BRANCH" >> ${GITHUB_OUTPUT}
          RELEASE=$(echo $RAW_VERSION | awk -F'+' '{print $2}')
          RELEASE=${RELEASE:-alpha.${{ github.run_number }}}
          echo "RELEASE=$RELEASE"
          echo "RELEASE=$RELEASE" >> ${GITHUB_ENV}
          echo "RELEASE=$RELEASE" >> ${GITHUB_OUTPUT}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Install build tools
        run: |
          apt update
          apt install -y git make golang file
      - name: Clone containerd
        run: |
          git clone --branch ${{ env.CONTAINERD_BRANCH }} --depth 1 https://github.com/containerd/containerd.git containerd
      - name: ls
        run: ls -lah
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Apply patches
      #  working-directory: containerd
      #  run: git apply ../*.patch
      - name: Build containerd
        working-directory: containerd
        env:
          GOOS: linux
          GOARCH: loong64
        run: make
      - name: Print binary SHA-256 checksums
        working-directory: containerd
        run: |
          find bin -type f | xargs sha256sum
      - name: Inspect binary file types
        working-directory: containerd
        run: |
          echo "=== bin ==="
          file bin/*
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: containerd-loong64-binaries
          path: |
            containerd/bin/*
      - name: Install QEMU binfmt for loong64
        run: |
          docker run --privileged --rm ghcr.io/loong64/binfmt --install all
      - name: Print containerd version
        working-directory: containerd
        run: |
          ./bin/containerd-shim-runc-v2 -v
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/build-os-release.txt
          cat /tmp/build-os-release.txt
      - name: Export installed packages
        run: |
          dpkg -l > /tmp/build-installed-packages.txt
          cat /tmp/build-installed-packages.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: containerd-loong64-system-info
          path: |
            /tmp/build-installed-packages.txt
            /tmp/build-os-release.txt

  rpm-anolis:
    needs: build
    runs-on: ubuntu-latest
    container: openanolis/anolisos:23
    outputs:
      ANOLIS_RPM_NAME: ${{ steps.rpm-file.outputs.ANOLIS_RPM_NAME }}
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ needs.build.outputs.RAW_VERSION }}
      CONTAINERD_BRANCH: ${{ needs.build.outputs.CONTAINERD_BRANCH }}
      RELEASE: ${{ needs.build.outputs.RELEASE }}
      ARCH: loongarch64
    steps:
      - name: Install gzip
        run: yum install -y gzip
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract version
        run: |
          VERSION=$(echo $CONTAINERD_BRANCH | awk -F'v' '{print $2}')
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> ${GITHUB_ENV}
          DIST=$(rpm --eval '%{dist}')
          echo "DIST=$DIST"
          echo "DIST=$DIST" >> ${GITHUB_ENV}
      - name: Install build tools
        run: yum install -y rpm-build rpmdevtools rpm-sign
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-binaries
          path: artifacts
      - name: Build RPM
        run: |
          rm -rf ~/rpmbuild
          rpmdev-setuptree
          find ~/rpmbuild
          cp artifacts/* ~/rpmbuild/BUILD/
          cp LICENSE ~/rpmbuild/BUILD/
          cp systemd/containerd.service ~/rpmbuild/BUILD/
          cp containerd.spec ~/rpmbuild/SPECS/
          rpmbuild -ba --target ${{ env.ARCH }} ~/rpmbuild/SPECS/containerd.spec \
            --define "version ${{ env.VERSION }}" \
            --define "release ${{ env.RELEASE }}"
          mkdir -p rpms
          find ~/rpmbuild/RPMS -name '*.rpm'
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp -t rpms {} +
      - name: List RPM files
        id: rpm-file
        run: |
          ANOLIS_RPM_NAME=containerd-${{ env.VERSION }}-${{ env.RELEASE }}${{ env.DIST }}.${{ env.ARCH }}.rpm
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME"
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME" >> $GITHUB_OUTPUT
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME" >> $GITHUB_ENV
          echo "=== RPM file name: $ANOLIS_RPM_NAME ==="
          sha256sum rpms/$ANOLIS_RPM_NAME
          echo "=== RPM info ==="
          rpm -qpi rpms/$ANOLIS_RPM_NAME
          echo "=== RPM contents ==="
          rpm2cpio rpms/$ANOLIS_RPM_NAME | cpio -it
      - name: Import GPG key
        run: |
          export LANG=C.UTF-8
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -1 | cut -d: -f5)
          echo "GPG_KEY_ID=$GPG_KEY_ID"
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
      - name: Configure rpmmacros
        run: |
          cat > ~/.rpmmacros << EOF
          %_signature gpg
          %_gpg_path ~/.gnupg
          %_gpg_name ${{ env.GPG_KEY_ID }}
          %_gpgbin /usr/bin/gpg2
          %__gpg_sign_cmd %{__gpg} gpg --force-v3-sigs --digest-algo sha256 --batch --no-verbose --no-armor --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          EOF
          gpg --armor --export "${GPG_KEY_ID}" > /tmp/gpg-pubkey.asc
          rpm --import /tmp/gpg-pubkey.asc
      - name: Sign RPM
        run: |
          echo "=== Signing RPM with GPG key: $GPG_KEY_ID ==="
          rpm --addsign rpms/$ANOLIS_RPM_NAME
          echo "=== Verifying RPM signature ==="
          rpm --checksig rpms/$ANOLIS_RPM_NAME
          echo "=== RPM file name: $ANOLIS_RPM_NAME ==="
          sha256sum rpms/$ANOLIS_RPM_NAME
          echo "=== RPM info ==="
          rpm -qpi rpms/$ANOLIS_RPM_NAME
          echo "=== RPM contents ==="
          rpm2cpio rpms/$ANOLIS_RPM_NAME | cpio -it
      - name: Upload RPM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: containerd-loong64-rpm
          path: |
            rpms/${{ env.ANOLIS_RPM_NAME }}
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/rpm-anolis-os-release.txt
          cat /tmp/rpm-anolis-os-release.txt
      - name: Export installed packages
        run: |
          rpm -qa --queryformat '%{NAME}\t%{VERSION}\t%{RELEASE}\t%{ARCH}\n' | column -t -s $'\t' | sort -f > /tmp/rpm-anolis-installed-packages-rpm.txt
          cat /tmp/rpm-anolis-installed-packages-rpm.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: containerd-loong64-rpm-system-info
          path: |
            /tmp/rpm-anolis-installed-packages-rpm.txt
            /tmp/rpm-anolis-os-release.txt

  deb-debian:
    needs: build
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      DEBIAN_DEB_NAME: ${{ steps.deb-file.outputs.DEBIAN_DEB_NAME }}
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ needs.build.outputs.RAW_VERSION }}
      CONTAINERD_BRANCH: ${{ needs.build.outputs.CONTAINERD_BRANCH }}
      RELEASE: ${{ needs.build.outputs.RELEASE }}
      ARCH: loongarch64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install build tools
        run: |
          apt update
          apt install -y file
      - name: Extract version
        run: |
          VERSION=$(echo $CONTAINERD_BRANCH | awk -F'v' '{print $2}')
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> ${GITHUB_ENV}
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-binaries
          path: artifacts
      - name: Build DEB
        run: |
          PKG_ROOT=$(mktemp -d)
          mkdir -p $PKG_ROOT/usr/bin
          mkdir -p $PKG_ROOT/usr/share/doc/containerd
          mkdir -p $PKG_ROOT/usr/lib/systemd/system
          mkdir -p $PKG_ROOT/DEBIAN

          install -m 755 artifacts/ctr $PKG_ROOT/usr/bin/ctr
          install -m 755 artifacts/containerd $PKG_ROOT/usr/bin/containerd
          install -m 755 artifacts/containerd-shim-runc-v2 $PKG_ROOT/usr/bin/containerd-shim-runc-v2
          install -m 755 artifacts/containerd-stress $PKG_ROOT/usr/bin/containerd-stress
          install -m 644 LICENSE $PKG_ROOT/usr/share/doc/containerd/copyright

          install -m 644 systemd/containerd.service $PKG_ROOT/usr/lib/systemd/system/containerd.service

          cat > $PKG_ROOT/DEBIAN/postinst <<'PIEOS'
          #!/bin/sh
          set -e
          if [ ! -f /etc/containerd/config.toml ]; then
              mkdir -p /etc/containerd
              containerd config default > /etc/containerd/config.toml
          fi
          echo "=== containerd installed ==="
          echo "systemd service file: /usr/lib/systemd/system/containerd.service"
          echo "Install service:"
          echo "  sudo systemctl daemon-reload"
          echo "  sudo systemctl enable containerd.service"
          echo "  sudo systemctl start containerd.service"
          PIEOS
          chmod 755 $PKG_ROOT/DEBIAN/postinst

          cat > $PKG_ROOT/DEBIAN/prerm <<'PRERMOS'
          #!/bin/sh
          set -e
          echo "=== containerd uninstalling ==="
          echo "Stop and remove service before uninstalling:"
          echo "  sudo systemctl stop containerd.service 2>/dev/null || true"
          echo "  sudo systemctl disable containerd.service 2>/dev/null || true"
          echo "  sudo rm -f /etc/systemd/system/containerd.service"
          echo "  sudo systemctl daemon-reload"
          PRERMOS
          chmod 755 $PKG_ROOT/DEBIAN/prerm

          cat > $PKG_ROOT/DEBIAN/control << EOF
          Package: containerd
          Version: ${{ env.VERSION }}-${{ env.RELEASE }}
          Architecture: ${{ env.ARCH }}
          Maintainer: 徐晓伟 <xuxiaowei@xuxiaowei.com.cn>
          Description: containerd (loong64)
           containerd container runtime binaries for the loong64 (LoongArch) architecture.
          Homepage: https://github.com/kubernetes-loong64/containerd-loong64
          Section: admin
          Priority: optional
          EOF

          mkdir -p debs
          dpkg-deb --build $PKG_ROOT debs/

          find debs -name '*.deb'
      - name: List DEB files
        id: deb-file
        run: |
          DEBIAN_DEB_NAME=containerd_${{ env.VERSION }}-${{ env.RELEASE }}_${{ env.ARCH }}.deb
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME"
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME" >> $GITHUB_OUTPUT
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME" >> $GITHUB_ENV
          echo "=== DEB file name: $DEBIAN_DEB_NAME ==="
          sha256sum debs/$DEBIAN_DEB_NAME
          echo "=== DEB info ==="
          dpkg --info debs/$DEBIAN_DEB_NAME
          echo "=== DEB contents ==="
          dpkg --contents debs/$DEBIAN_DEB_NAME
      - name: Upload DEB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: containerd-loong64-deb
          path: |
            debs/${{ env.DEBIAN_DEB_NAME }}
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/deb-debian-os-release.txt
          cat /tmp/deb-debian-os-release.txt
      - name: Export installed packages
        run: |
          dpkg -l > /tmp/deb-debian-installed-packages-packages.txt
          cat /tmp/deb-debian-installed-packages-packages.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: containerd-loong64-deb-system-info
          path: |
            /tmp/deb-debian-installed-packages-packages.txt
            /tmp/deb-debian-os-release.txt

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ rpm-anolis, deb-debian ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      IS_STABLE: ${{ needs.build.outputs.IS_STABLE }}
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
      ANOLIS_RPM_NAME: ${{ needs.rpm-anolis.outputs.ANOLIS_RPM_NAME }}
      DEBIAN_DEB_NAME: ${{ needs.deb-debian.outputs.DEBIAN_DEB_NAME }}
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-binaries
          path: loong64-artifacts
      - name: Download system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-system-info
          path: loong64-artifacts
      - name: Download RPM system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-rpm-system-info
          path: loong64-artifacts
      - name: Download DEB system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-deb-system-info
          path: loong64-artifacts
      - name: Download RPM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-rpm
          path: loong64-artifacts
      - name: Download DEB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerd-loong64-deb
          path: loong64-artifacts
      - name: List release artifacts
        run: |
          find loong64-artifacts -type f
      - name: Import GPG key
        run: |
          export LANG=C.UTF-8
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
      - name: Sign artifacts
        run: |
          find loong64-artifacts -type f | while read -r file; do
            gpg --batch --detach-sign --armor "$file"
            echo "Signed: $file"
            gpg --verify "$file".asc "$file"
          done
      - name: Generate release body
        run: |
          cat > release-body.md <<'BODYEOF'
          ## Artifacts

          | File                         | Download                                                                     |
          |------------------------------|------------------------------------------------------------------------------|
          | `ctr`                        | [ctr](${{ env.BASE_URL }}/ctr)                                               |
          | `containerd`                 | [containerd](${{ env.BASE_URL }}/containerd)                                 |
          | `containerd-shim-runc-v2`    | [containerd-shim-runc-v2](${{ env.BASE_URL }}/containerd-shim-runc-v2)       |
          | `containerd-stress`          | [containerd-stress](${{ env.BASE_URL }}/containerd-stress)                   |
          | `${{ env.ANOLIS_RPM_NAME }}` | [${{ env.ANOLIS_RPM_NAME }}](${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}) |
          | `${{ env.DEBIAN_DEB_NAME }}` | [${{ env.DEBIAN_DEB_NAME }}](${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}) |

          Each file has a corresponding `.asc` detached GPG signature.

          ```shell
          # Binaries
          curl -LO ${{ env.BASE_URL }}/ctr
          curl -LO ${{ env.BASE_URL }}/ctr.asc
          curl -LO ${{ env.BASE_URL }}/containerd
          curl -LO ${{ env.BASE_URL }}/containerd.asc
          curl -LO ${{ env.BASE_URL }}/containerd-shim-runc-v2
          curl -LO ${{ env.BASE_URL }}/containerd-shim-runc-v2.asc
          curl -LO ${{ env.BASE_URL }}/containerd-stress
          curl -LO ${{ env.BASE_URL }}/containerd-stress.asc

          # RPM (Anolis)
          curl -LO ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}
          curl -LO ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}.asc

          # DEB (Debian)
          curl -LO ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}
          curl -LO ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}.asc
          ```

          ## Verifying releases

          ```shell
          gpg --keyserver keys.openpgp.org --recv-keys FCF8724722CCBF9F51B1FBE376532BE7E3013105
          echo "FCF8724722CCBF9F51B1FBE376532BE7E3013105:6:" | gpg --import-ownertrust
          gpg --verify <file>.asc <file>
          ```
          BODYEOF
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ env.IS_STABLE == 'false' }}
          make_latest: ${{ env.IS_STABLE == 'true' && 'legacy' || 'false' }}
          files: |
            loong64-artifacts/**

  trigger-gitlab:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ rpm-anolis, deb-debian, release ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
      ANOLIS_RPM_NAME: ${{ needs.rpm-anolis.outputs.ANOLIS_RPM_NAME }}
      DEBIAN_DEB_NAME: ${{ needs.deb-debian.outputs.DEBIAN_DEB_NAME }}
      GITLAB_API_URL: ${{ vars.GITLAB_API_URL || 'https://gitlab.xuxiaowei.com.cn' }}
      GITLAB_PROJECT_ID: ${{ vars.GITLAB_PROJECT_ID || '590' }}
      GITLAB_REF: ${{ vars.GITLAB_REF || 'sync' }}
    steps:
      - name: Trigger GitLab CI
        env:
          ANOLIS_RPM_URL: ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}
          DEBIAN_DEB_URL: ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}
        run: |
          curl --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{
              "ref": "${{ env.GITLAB_REF }}",
              "variables": [
                {"key": "ANOLIS_RPM_URL", "value": "${{ env.ANOLIS_RPM_URL }}"},
                {"key": "DEBIAN_DEB_URL", "value": "${{ env.DEBIAN_DEB_URL }}"}
              ]
            }' \
            --url "${{ env.GITLAB_API_URL }}/api/v4/projects/${{ env.GITLAB_PROJECT_ID }}/pipeline"

